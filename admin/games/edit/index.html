<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Game</title>
</head>

<body>

<h1>Edit Game</h1>

<p id="loading">Loading...</p>

<form id="gameForm">

<input id="name" placeholder="Game Name" required />
<br><br>

<input id="slug" placeholder="slug (folder name)" required />
<br><br>

<input id="thumbnail" placeholder="thumbnail url" />
<br><br>

<select id="type">
<option value="slot">slot</option>
<option value="fish">fish</option>
<option value="card">card</option>
<option value="arcade">arcade</option>
<option value="casual">casual</option>
</select>

<br><br>

<label>
<input type="checkbox" id="supports_live">
supports live
</label>

<br><br>

<label>
<input type="checkbox" id="published">
published
</label>

<br><br>

<button type="submit">Update Game</button>

</form>

<script type="module" src="/src/admin/game-form.js"></script>

</body>
</html>
